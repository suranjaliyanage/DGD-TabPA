project:
  name: "DGD-TabPA"
  seed: 42

data:
  dataset: "adult"
  data_dir: "data/raw"
  test_size: 0.2
  datasets:
    # --- 1. Generic Industrial Benchmarks ---
    adult:
      name: "Adult Income (Census Income)"
      source: "https://doi.org/10.24432/C5XW20"
      target: "income"
      task: "classification"
    churn:
      name: "Churn Modelling"
      source: "https://www.kaggle.com/datasets/shrutimechlearn/churn-modelling"
      target: "Exited"
      task: "classification"
    credit:
      name: "Default of Credit Card Clients"
      source: "https://www.kaggle.com/uciml/default-of-credit-card-clients-dataset"
      target: "default"
      task: "classification"
    covertype:
      name: "Forest Cover Type (Covertype)"
      source: "https://doi.org/10.24432/C50K5N"
      target: "Cover_Type"
      task: "classification"
    # --- 2. Specialized Medical Benchmarks ---
    cvd:
      name: "Cardiovascular Disease (CVD)"
      source: "https://www.kaggle.com/sulianova/cardiovascular-disease-dataset"
      target: "cardio"
      task: "classification"
    hcv:
      name: "Hepatitis C Virus (HCV) for Egyptian Patients"
      source: "https://archive.ics.uci.edu/dataset/503"
      target: "histological_staging"
      task: "classification"
    ilpd:
      name: "Indian Liver Patient (ILP)"
      source: "https://archive.ics.uci.edu/ml/datasets/ILPD+(Indian+Liver+Patient+Dataset)"
      target: "is_patient"
      task: "classification"
    diabetes:
      name: "Pima Indians Diabetes"
      source: "https://kaggle.com/uciml/pima-indians-diabetes-database"
      target: "Outcome"
      task: "classification"
    # --- 3. Regression Benchmarks ---
    california_housing:
      name: "California Housing"
      source: "https://www.kaggle.com/camnugent/california-housing-prices"
      target: "MedHouseVal"
      task: "regression"
    king_county:
      name: "House Sales in King County"
      source: "https://www.kaggle.com/datasets/harlfoxem/housesalesprediction"
      target: "price"
      task: "regression"

preprocessing:
  numerical_transform: "quantile_normal"
  categorical_encoding: "onehot"

model:
  d_model: 128
  n_heads: 4
  n_encoder_layers: 3
  n_decoder_layers: 3
  d_ff: 512
  dropout: 0.1
  activation: "gelu"

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "linear"
  loss_type: "mse"
  sampling_steps: 20

training:
  batch_size: 256
  learning_rate: 0.0001
  weight_decay: 0.0001
  epochs: 10
  device: "auto"
  gradient_clip: 1.0
  log_interval: 10

distillation:
  num_synthetic: 500
  distill_lr: 0.01
  distill_epochs: 10
  inner_steps: 10
  surrogate: "mlp"
  matching: "distribution"

privacy:
  enabled: false
  epsilon: 8.0
  delta: 1e-5
  max_grad_norm: 1.0
  noise_multiplier: 1.1

evaluation:
  tstr_models:
    - "xgboost"
    - "catboost"
    - "mlp"
  metrics:
    - "dcr"
    - "f1_score"
    - "wasserstein"
    - "ks_test"
    - "pcd"

api:
  host: "0.0.0.0"
  port: 5000
  debug: true
